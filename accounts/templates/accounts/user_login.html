{% extends 'base.html' %}

{% block body %}

<div class="min-h-screen flex items-center justify-center px-4 py-10">
    <div class="bg-white/75 backdrop-blur-md border border-white/60 p-8 rounded-3xl shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-slate-800">Login</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label for="username" class="block text-gray-700">Username</label>
                <input type="text" id="username" name="username" value="{{ form.username.value|default:'' }}" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            <div class="mb-6">
                <label for="password" class="block text-gray-700">Password</label>
                <input type="password" id="password" name="password" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                {% if form.non_field_errors %}
                    <div class="mt-2 text-sm text-red-600">
                        {{ form.non_field_errors|join:", " }}
                    </div>
                    <div class="mt-3">
                        <a href="{% url 'register' %}" class="inline-flex items-center rounded-lg bg-blue-900 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-800">Register</a>
                    </div>
                {% endif %}
            </div>
            <div class="flex items-center justify-between">
                <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500">Login</button>
                <a href="" class="text-blue-500 hover:underline">Forgot password?</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
